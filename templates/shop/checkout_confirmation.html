{% extends "base.html" %}
{% block title %}Zamówienie{% endblock %}

{% block content %}
<style>
  :root{
    --primary:#003E56;
    --panel:#F5F5F5;
    --border: rgba(0,0,0,.12);
    --shadow: 0 18px 50px rgba(0,0,0,.10);
    --muted:#6b6b6b;
  }

  .wrap{ max-width: 820px; margin: 0 auto; padding: 22px 16px 40px; }

  .panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .title{ font-size: 26px; font-weight: 600; margin: 0 0 6px; }
  .muted{ color: var(--muted); margin: 0; }

  .status-pill{
    display:inline-flex; align-items:center; gap:10px;
    padding: 10px 14px; border-radius: 999px;
    border: 1px solid rgba(0,0,0,.16);
    background: rgba(255,255,255,.55);
    margin-top: 14px;
  }

  .spinner{
    width: 16px; height: 16px;
    border-radius: 999px;
    border: 2px solid rgba(0,62,86,.25);
    border-top-color: var(--primary);
    animation: spin 1s linear infinite;
  }
  @keyframes spin{ to { transform: rotate(360deg); } }

  .check{
    width: 18px; height: 18px;
    border-radius: 999px;
    background: rgba(0,62,86,.12);
    border: 1px solid rgba(0,62,86,.25);
    display:grid; place-items:center;
    color: var(--primary);
    font-weight: 700;
    line-height: 1;
  }

  .actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 16px; flex-wrap: wrap; }

  .btn-outline-soft-like{
    background: transparent;
    border: 1px solid rgba(0,0,0,.3);
    color: #1c1c1c;
    border-radius: 16px;
    padding: 11px 18px;
    font-weight: 400;
    line-height: 1;
    text-decoration: none !important;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .btn-outline-soft-like:hover{
    border-color: rgba(0,62,86,.45);
    color: var(--primary);
    background: rgba(255,255,255,.25);
  }
</style>

<div class="wrap">
  <div class="panel">
    <h1 class="title" id="mainTitle">Zamówienie złożone</h1>

    <p class="muted">
      Numer zamówienia: <strong>#{{ order.id }}</strong><br>
      Status płatności:
      <strong id="statusText"
              data-status="{{ order.payment_status }}">
        {{ order.get_payment_status_display }}
      </strong>
    </p>

    <div class="status-pill" id="statusPill">
      <span class="spinner" id="statusSpinner"></span>
      <span class="check d-none" id="statusCheck">✓</span>
      <span id="statusLabel">Czekamy na potwierdzenie płatności…</span>
    </div>

    <div class="actions">
      <a class="btn-outline-soft-like" href="{% url 'offers:list' %}">Wróć do ofert</a>
    </div>
  </div>
</div>

<script>
(function () {
  const statusUrl = "{% url 'shop:order_status' order.id %}";

  const mainTitle = document.getElementById("mainTitle");
  const statusEl  = document.getElementById("statusText");
  const statusLabel = document.getElementById("statusLabel");
  const spinner = document.getElementById("statusSpinner");
  const check = document.getElementById("statusCheck");

  function setState(status, label){
    if (label) statusEl.textContent = label;
    statusEl.dataset.status = status;

    if (status === "paid") {
      mainTitle.textContent = "Zamówienie złożone — płatność potwierdzona";
      statusLabel.textContent = "Dziękujemy! Płatność została potwierdzona.";
      spinner.classList.add("d-none");
      check.classList.remove("d-none");
      return true;
    }

    if (status === "failed" || status === "canceled") {
      mainTitle.textContent = "Płatność się nie powiodła";
      statusLabel.textContent = "Zamówienie chwilowo nie może być zrealizowane. Spróbuj ponownie później lub skontaktuj się z nami jeśli problem będzie się powtarzałm.";
      spinner.classList.add("d-none");
      check.classList.add("d-none");
      return true;
    }

    mainTitle.textContent = "Zamówienie złożone";
    statusLabel.textContent = "Czekamy na potwierdzenie płatności…";
    spinner.classList.remove("d-none");
    check.classList.add("d-none");
    return false;
  }

  let attempts = 0;
  const maxAttempts = 120;

  setState(statusEl.dataset.status, statusEl.textContent.trim());

  async function tick(){
    attempts += 1;
    try{
      const res = await fetch(statusUrl, {headers: {"X-Requested-With": "XMLHttpRequest"}});
      const data = await res.json();

      const done = setState(data.status, data.label);
      if (done) return;
    }catch(e){
    }

    if (attempts < maxAttempts){
      setTimeout(tick, 2000);
    } else {
      statusLabel.textContent = "To trwa dłużej niż zwykle. Odśwież stronę za chwilę.";
      spinner.classList.add("d-none");
    }
  }

  setTimeout(tick, 900);
})();
</script>
{% endblock %}
